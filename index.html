<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FRC Team Guess</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">FRC EPA Guessing Game</p>
          <h1>Teamdle</h1>
        </div>
        <button id="new-game" class="ghost-button" type="button">New Team</button>
      </header>

      <section class="status-panel" aria-live="polite">
        <div>
          <span class="label">Mystery pool</span>
          <strong id="pool-size">Top EPA teams</strong>
        </div>
        <div>
          <span class="label">Guesses</span>
          <strong id="guess-count">0 / 8</strong>
        </div>
        <div>
          <span class="label">Result</span>
          <strong id="result-text">Find the team</strong>
        </div>
      </section>

      <section class="guess-panel">
        <form id="guess-form" autocomplete="off">
          <label for="team-input">Guess an FRC team</label>
          <div class="input-row">
            <input id="team-input" list="team-options" placeholder="Try 254 or Cheesy Poofs">
            <button type="submit">Guess</button>
          </div>
          <datalist id="team-options"></datalist>
        </form>
        <p id="message" class="message">Green is exact. Yellow is close or partial. Arrows point toward the answer.</p>
      </section>

      <section class="legend" aria-label="Legend">
        <span><i class="tile exact"></i> Exact</span>
        <span><i class="tile close"></i> Close</span>
        <span><i class="tile miss"></i> Miss</span>
      </section>

      <section class="table-wrap" aria-label="Guess history">
        <div class="guess-grid header">
          <span>Team</span>
          <span>Name</span>
          <span>Region</span>
          <span>District</span>
          <span>Rookie</span>
          <span>EPA</span>
          <span>Win%</span>
        </div>
        <div id="guesses" class="guesses"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
